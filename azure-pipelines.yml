trigger:
  branches:
    include:
      - main
      - develop
  
  paths:
    exclude:
      - commitizen.conf
 
pool: 'TfsOracle'

variables:
  repo: ssh://tfs.aas.com.sa:22/Medad/Medad%20Content%20Plus/_git
  docker_repository: gokb
  isDev: $[eq(variables['build.sourceBranch'], 'refs/heads/develop')]
  isMain: $[eq(variables['build.sourceBranch'], 'refs/heads/main')]

resources:
  repositories:
  - repository: medad_devops
    type: git
    name: Medad DevOps/medad_devops

stages:
- stage: Autoversion
  displayName: Generate new verion and release notes
  condition: eq(variables.isMain, true)
  jobs:
    - job: autoversion
      steps:
        - template: autoversion.yml@medad_devops
        
- stage: Build
  condition: or(eq(variables.isDev, true), and(succeeded('Autoversion'), eq(variables.isMain, true)))
  jobs:
    - job: BuildImage
      displayName: Build and push the image
      variables: 
        tag: $[ stageDependencies.Autoversion.autoversion.outputs['passOutput.tag'] ]
      steps:
        - task: Docker@2
          inputs:
            containerRegistry: 'Naseej Docker Hub'
            command: 'login'

        - task: Docker@2
          inputs:
            containerRegistry: 'Naseej Docker Hub'
            repository: 'axhxgarudf1b/$(docker_repository)'
            command: 'build'
            tags: |
              $(tag)
              latest
            Dockerfile: '**/Dockerfile'
            buildContext: '$(Build.SourcesDirectory)'
          

        - task: Docker@2
          displayName: "Push - Medad Image"
          inputs:
            containerRegistry: "Naseej Docker Hub"
            repository: axhxgarudf1b/$(docker_repository)
            command: push
            tags: |
              $(tag)
              latest

- stage: Stage
  condition: and(succeeded('Build'), eq(variables.isMain, true))
  displayName: Deploy to stage
  dependsOn: 
    - Autoversion
    - Build
  jobs:
  - job: DeployStg
    displayName: Deploy to stage
    variables: 
      tag: $[ stageDependencies.Autoversion.autoversion.outputs['passOutput.tag'] ]
    steps:
      - task: Kubernetes@1
        displayName: Deploy gokb
        inputs:
          connectionType: "Kubernetes Service Connection"
          kubernetesServiceEndpoint: "k8s-stage-Medad Content Plus"
          command: "set"
          arguments: "image deployment/gokb   gokbe=jed.ocir.io/axhxgarudf1b/$(docker_repository):$(tag)"
          namespace: "content-plus"
- stage: Security
  displayName: QA-Sandbox Approval  
  variables: 
      tag: $[ stageDependencies.Autoversion.autoversion.outputs['passOutput.tag'] ]
  condition: and(succeeded('Stage'), eq(variables.isMain, true))
  dependsOn:
    - Autoversion
    - Build
    - Stage
  jobs:
  - job: ProductManualValidation
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      inputs:
          notifyUsers: |
            ahmed.alhusainy@naseej.com
            a.zerrouki@naseej.com
            waad.alqahtani@naseej.com
          instructions: 'please reveiw and approve deploy updates to QA, demo and delivery sites'
          onTimeout: reject

  - job: scanImage
    dependsOn: ProductManualValidation
    condition: succeeded()
    displayName: Scan image for vulnerabilities
    steps:
      - task: Docker@2
        displayName: "login to Production Environment"
        inputs:
          containerRegistry: "Production Environment"
          command: login
          
      - task: Docker@2
        displayName: "login to Naseej Docker Hub"
        inputs:
          containerRegistry: "Naseej Docker Hub"
          command: login
      
      - script: |
          mkdir ~/tmp
          export DOCKER_SCOUT_CACHE_DIR=~/tmp
          docker pull jed.ocir.io/axhxgarudf1b/$(docker_repository):$(tag)
          echo "Installing Docker Scout CLI..."
          curl -sSfL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
          docker login -u $(DOCKER_HUB_USER) -p $(DOCKER_HUB_PAT)
          echo "Scanning the image for CVEs..."
          ~/.docker/cli-plugins/docker-scout cves jed.ocir.io/axhxgarudf1b/$(docker_repository):$(tag)  --exit-code --only-fixed --only-severity critical,high --format markdown --output markdown.html
        displayName: "Docker Scout Scan"
       
      - task: publishhtmlreport@1
        condition: always()
        displayName: 'Publish docker scan report'
        inputs:
          htmlType: 'genericHTML'
          htmlPath: '$(System.DefaultWorkingDirectory)/markdown.html'
        continueOnError: true

  - job: Security
    condition: and(succeeded('ProductManualValidation'), failed('scanImage'))
    pool: server
    dependsOn: scanImage
    timeoutInMinutes: 720
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: |
          ahmed.alhusainy@naseej.com
          a.zerrouki@naseej.com
          waad.alqahtani@naseej.com
        instructions: 'please reveiw scan report and approve for deploy'
        onTimeout: reject

- stage: QaPreparing
  dependsOn:
    - Autoversion
    - Build
    - Stage
    - Security
  condition: and(succeeded('Stage'), eq(variables.isMain, true))
  variables:
    security_scan: $[stageDependencies.Security.scanImage.result]
    manual_validation: $[stageDependencies.Security.Security.result]
    tag: $[ stageDependencies.Autoversion.autoversion.outputs['passOutput.tag'] ]
  jobs:
  - job: push
    condition: or(eq(variables.security_scan, 'Succeeded'), eq(variables.manual_validation, 'Succeeded'))
    steps:
    - task: Docker@2
      displayName: "login to Production Environment"
      inputs:
        containerRegistry: "Production Environment"
        command: login
        
    - task: Docker@2
      displayName: "login to Naseej Docker Hub"
      inputs:
        containerRegistry: "Naseej Docker Hub"
        command: login
        
    - script: |
        docker pull jed.ocir.io/axhxgarudf1b/$(docker_repository):$(tag)
        docker tag jed.ocir.io/axhxgarudf1b/$(docker_repository):$(tag) naseejsa/$(docker_repository):$(tag)
      displayName: "Retag Image"

    - task: Docker@2
      displayName: "Push - Medad Image"
      inputs:
        containerRegistry: "Production Environment"
        repository: "naseejsa/$(docker_repository)"
        command: push
        tags: $(tag)
    - script: |
        docker rmi naseejsa/$(docker_repository):$(tag)
        docker rmi jed.ocir.io/axhxgarudf1b/$(docker_repository):$(tag)
      displayName: removeImageAfterPush

  - job: UpdateGithub 
    condition: or(eq(variables.security_scan, 'Succeeded'), eq(variables.manual_validation, 'Succeeded'))
    steps:
        - bash: |
              git config --global user.email TFSPipelines@naseej.com && git config --global user.name TFSPipelines
              echo "Cloning repo"
              git clone https://$(GITHUB_TOKEN)@github.com/itnaseej/medad-qa.git
              cd medad-qa
              echo $(docker_repository):$(tag) > ils-$(docker_repository)-version.txt
              git add ils-$(docker_repository)-version.txt
              git commit -m "update-$(docker_repository))-docker-version-$(tag)"
              git push https://$(GITHUB_TOKEN)@github.com/itnaseej/medad-qa.git
          displayName: UpdateGithub
  - job: FixStageStatus
    condition: and(ne(variables.security_scan, 'Succeeded'), ne(variables.manual_validation, 'Succeeded'))
    steps:
    - bash: exit 1
